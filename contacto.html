<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portefólio Tiago - Contacto</title>
  <meta name="description" content="Portefólio Tiago - Contacto">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style-scene-cards-2-fixed.css">
</head>
<body>
  <a class="skip-link" href="#mainContent">Saltar para o conteúdo</a>
  <div class="page-background" aria-hidden="true"></div>

  <header class="site-header">
    <a href="./sobre.html" class="brand-mark" aria-label="Portefólio Tiago" data-fullname="Tiago Duarte Costa">Tiago Duarte Costa</a>
  </header>

  <main id="mainContent" class="experience-shell">
    <div class="road-stage">
      <div class="scene-layer" aria-hidden="true"><div class="scene-debug-line"></div></div>

      <div class="car-lane" aria-hidden="true">
        <div id="carWrapper" class="car-wrapper">
          <img id="carImage" class="car-image" src="./car-on.gif" alt="Carro">
        </div>
      </div>

      <section id="contacto" class="panel panel--ghost" aria-label="Contacto">
        <div class="percurso-layout contacto-layout" aria-label="Conteúdo Contacto">
          <h1 class="percurso-title">contacto</h1>
          <div class="percurso-subtitle">vamos conversar</div>

          <article class="road-card is-visible contacto-card">
            <div class="road-card-inner">
              <p class="scene-copy">Se quiseres falar sobre projetos, colaborações ou oportunidades profissionais, estou disponível para conversar.</p>
              <div class="contacto-bottom-links" aria-label="Links de contacto">
                <a class="contacto-icon-link" href="https://www.instagram.com/tdc_tiago/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                  <img src="./instagram.svg" alt="Instagram">
                </a>
                <a class="contacto-icon-link" href="https://www.linkedin.com/in/tiago-duarte-costa-3b9310145/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                  <img src="./linkedin.svg" alt="LinkedIn">
                </a>
                <a class="contacto-icon-link" href="./tiago_cv_2026.pdf" download="tiago_cv_2026.pdf" aria-label="CV">
                  <img src="./cv.svg" alt="CV">
                </a>
              </div>
            </div>
          </article>
        </div>
      </section>

    </div>
  </main>

  <nav class="bottom-nav" aria-label="Início">
    <a data-active="#sobre" href="./index.html">Sobre</a>

    <a data-active="#percurso" href="./percurso.html">Percurso</a>
    <a data-active="#projetos" href="./projetos.html">Projetos</a>
    <a data-active="#contacto" href="./contacto.html" class="is-active">Contacto</a>
  </nav>

  <script src="./shell-car-nav.js" defer></script>
</body>
</html>
