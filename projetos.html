<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiago Duarte Costa — Projetos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Press+Start+2P&family=Six+Caps&family=Tenor+Sans&display=swap" rel="stylesheet">

  <style>
    .projects-grid {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(0, 1.55fr);
      gap: var(--space-4);
    }

.project-selector {
      width: auto;
      min-height: 0;
      padding: 0;
      gap: 0;
      border: none;
      outline: none;
      box-shadow: none;
      border-radius: 999px;
      background: transparent;
      opacity: 0.5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: none;
      transform: none;
    }




.project-selector img {
      max-height: none;
      width: clamp(56px, 10vw, 90px);
      height: auto;
      object-fit: contain;
      filter: grayscale(1) brightness(1.2);
      pointer-events: none;
    }

.nav-media-button img {
      max-height: none;
      width: clamp(30px, 6vw, 55px);
      height: auto;
      object-fit: contain;
      filter: grayscale(1) brightness(1.2);
      pointer-events: none;
      object-fit: contain;
      filter: grayscale(1) brightness(1.2);
      pointer-events: none;
    }



    .project-selector:hover,
    .project-selector:focus-visible,
    .nav-media-button:hover,
    .nav-media-button:focus-visible {
      background: transparent;
      border-color: transparent;
      transform: none;

    }



.selector-grid {
      width: auto;
      display: flex;
      flex-direction: row;
      gap: var(--space-3);
      justify-content: center;
      align-items: center;
    }


    .project-copy {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      align-items: flex-start;
      justify-content: flex-start;
      text-align: left;
    }

    .media-nav {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-2);
      margin-top: auto;
    }

    .nav-media-button {
      min-width: 54px;
      min-height: 42px;
      padding: 0 0.9rem;
      border: none;
      outline: none;
      box-shadow: none;
      border-radius: 999px;
      background: transparent;
      opacity: 0.5;
      display: inline-flex;

      align-items: center;
      justify-content: center;
      transition: none;
      transform: none;
    }



    .nav-media-button[disabled] {
      opacity: 0.45;
      transform: none;
      cursor: default;
    }

    /* sem background nos botões; estado único é opacity */
.project-selector[aria-pressed="true"]{ background: transparent; opacity: 1; }
    .project-selector[aria-pressed="false"]{ background: transparent; opacity: 0.25; }

    .project-selector:hover,
    .project-selector:focus-visible {
      background: transparent;
      border-color: transparent;
      transform: none;
      opacity: 1;
    }

    .nav-media-button:hover,
    .nav-media-button:focus-visible {
      background: transparent;
      border-color: transparent;
      transform: none;
      opacity: 1;
    }




    .media-card {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }


      .media-stage {
      width: 100%;
      max-width: 100%;
      height: 100%;
      min-height: 0;
      aspect-ratio: auto;


      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 4px);
      background: #000;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
    }


    .media-stage img,
    .media-stage video,
    .media-stage iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
    }

    .media-stage img,
    .media-stage video,
    .media-stage iframe {
      object-fit: contain;
      background: #000;
      max-width: 100%;
      max-height: 100%;
    }


    

    .media-placeholder {
      padding: var(--space-4);
      text-align: center;
      color: var(--text-soft);
    }

    @media (max-width: 900px) {
      .projects-grid {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      }

      .media-stage {
        overflow: hidden;
      }

      .media-stage img,
      .media-stage video,
      .media-stage iframe {
        object-fit: contain;
      }
    }


    @media (max-width: 560px) {
      .selector-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .media-card {
        padding: var(--space-3);
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="site-header">
      <a class="site-header__link" href="index.html" aria-label="Ir para Início">
        <div class="site-header__inner">
          <div class="site-logo" aria-label="Logo">
            <img src="logo.svg" alt="Logo" loading="eager" decoding="async">
          </div>
          <p class="site-name">Tiago Duarte Costa</p>
        </div>
      </a>
    </header>


    <section class="hero">
      <div class="hero__inner">
        <h2>Projetos Académicos</h2>
        <p>Clique nos botões para navegar entre as Projetos</p>
      </div>
    </section>

    <main class="cards-section">
      <div class="cards-section__inner">
        <section class="projects-grid">

          <article class="card">
            <div class="card__content">
            </div>

            <div class="project-copy">
              <p id="project-text"></p>
            </div>

            <div class="selector-grid">
              <button class="project-selector" type="button" data-project="foto" aria-pressed="true" aria-label="Fotografia">
                <img src="foto.svg" alt="Fotografia">
              </button>

              <button class="project-selector" type="button" data-project="video" aria-pressed="false" aria-label="Vídeo">
                <img src="video.svg" alt="Vídeo">
              </button>

              <button class="project-selector" type="button" data-project="ia" aria-pressed="false" aria-label="IA">
                <img src="ia.svg" alt="IA">
              </button>

              <button class="project-selector" type="button" data-project="jangada" aria-pressed="false" aria-label="Jangada Filmes">
                <img src="jangada.svg" alt="Jangada Filmes">
              </button>
            </div>

            <div class="media-nav">
              <button class="nav-media-button" id="prev-media" type="button" aria-label="Conteúdo anterior">
                <img src="anterior.svg" alt="Anterior">
              </button>

              <button class="nav-media-button" id="next-media" type="button" aria-label="Conteúdo seguinte">
                <img src="seguinte.svg" alt="Seguinte">
              </button>
            </div>
          </article>

          <article class="card media-card">
            <div class="media-stage" id="media-stage">
              <div class="media-placeholder">
                <p>A carregar conteúdo...</p>
              </div>
            </div>
          </article>

        </section>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <div class="bottom-nav__inner">

        <div class="bottom-nav__all-links">
          <div class="bottom-nav__side bottom-nav__side--left">
            <a href="percurso.html">«-</a>
          </div>

          <div class="bottom-nav__center">
            <a href="index.html">Início</a>
            <a href="percurso.html">Percurso</a>
            <a href="projetos.html" class="is-active">Projetos</a>
            <a href="contacto.html">Contacto</a>
          </div>

          <div class="bottom-nav__side bottom-nav__side--right">
            <a href="contacto.html">-»</a>
          </div>
        </div>

      </div>
    </nav>


  </div>

  <script>
    const state = {
      currentProject: "foto",
      currentIndex: 0
    };

    const projectText = document.getElementById("project-text");
    const mediaStage = document.getElementById("media-stage");
    const projectButtons = document.querySelectorAll(".project-selector");
    const prevMediaBtn = document.getElementById("prev-media");
    const nextMediaBtn = document.getElementById("next-media");

    const content = {
      foto: {
        text: "Neste conjunto de fotografias exploro composição, imaginando um catálogo de época de uma Honda Vision de 1991",
        type: "images",
        manifest: "fotos-manifest.json"
      },

      // Para videos: agora o texto é específico para cada vídeo (por índice)
      video: {
        type: "videos",
        items: [
          {
            src: "https://www.youtube-nocookie.com/embed/oMchMbfaUkY?rel=0&modestbranding=1&playsinline=1",
            text: "Stop-Motion: Reparação de um Game-Boy, onde exploro o meu hobbie da reparação de consolas e aprendo a fazer vídeos em stop-motion."
          },
          {
            src: "https://www.youtube-nocookie.com/embed/6GwcEg-U8kA?rel=0&modestbranding=1&playsinline=1",
            text: "Curta-Metragem PEOPLE — Inteiramente escrita, produzida e realizada por mim na Lituância, na qual também atuo como protagonista."
          }
        ]
      },

      ia: {
        type: "videos",
        items: [
          {
            src: "https://www.youtube-nocookie.com/embed/LzZhZXk4mnc?rel=0&modestbranding=1&playsinline=1",
            text: "GREY TURISMO: Video-Jogo inspirado em jogos antigos, no qual me desafiei a escrever toda a programação do Jogo com Recurso a IA, para assim desenvolver as minhas capacidades nessa área. Em termos de sonorização, ela foi toda criada por mim em instrumentos dos anos 80."
          },
          {
            src: "https://www.youtube-nocookie.com/embed/GDuV3CyHQFk?rel=0&modestbranding=1&playsinline=1",
            text: "2330: Curta-Metragem de Ficção Científica produzida em 48 horas onde a IA era obrigatoriamente usada para gerar Imagem e Som. Argumento adaptado do disco 10000 anos depois entre Vénus e Marte, de José Cid"
          }
        ]
      },

      jangada: {
        text: "Um Documentário de Longa Duração e grande relevância cultural, onde entrevisto alguns dos maiores criativos em Portugal sobre Impacto da Inteligência Artificial na Arte em Portugal. Mais informações na página de Contacto.",
        type: "images",
        manifest: "fotosjangada-manifest.json"
      }
    };

    const cache = {};

    async function getManifestItems(manifestPath) {
      if (cache[manifestPath]) return cache[manifestPath];

      try {
        const response = await fetch(manifestPath);
        const rawText = await response.text();
        let parsed;

        try {
          parsed = JSON.parse(rawText);
        } catch {
          parsed = rawText
            .split(/\r?\n/)
            .map(line => line.trim())
            .filter(Boolean);
        }

        // Normalizar para uma lista “base” (pode vir em vários formatos)
        let rawItems = [];

        if (Array.isArray(parsed)) {
          rawItems = parsed;
        } else if (parsed && Array.isArray(parsed.files)) {
          rawItems = parsed.files;
        } else if (parsed && Array.isArray(parsed.images)) {
          rawItems = parsed.images;
        }

        // Transformar cada item num src string
        const items = rawItems
          .map((item) => {
            if (typeof item === "string") return item;
            if (!item || typeof item !== "object") return null;

            // Formato usado nos teus manifests (ex.: { file: "1.jpg" })
            if (typeof item.file === "string") {
              if (manifestPath.includes("fotosjangada")) return `./fotosjangada/${item.file}`;
              if (manifestPath.includes("fotos-manifest")) return `./fotos/${item.file}`;
              return item.file;
            }

            if (typeof item.src === "string") return item.src;
            if (typeof item.url === "string") return item.url;

            return null;
          })
          .filter(Boolean);

        cache[manifestPath] = items;
        return items;
      } catch {
        return [];
      }
    }

    function setPressedButton(activeKey) {
      projectButtons.forEach((button) => {
        button.setAttribute(
          "aria-pressed",
          button.dataset.project === activeKey ? "true" : "false"
        );
      });
    }

    function updateMediaNav(itemsLength) {
      const shouldDisable = itemsLength <= 1;
      prevMediaBtn.disabled = shouldDisable;
      nextMediaBtn.disabled = shouldDisable;
    }

    function renderImage(src, label) {
      mediaStage.innerHTML = "";
      const img = document.createElement("img");
      img.src = src;
      img.alt = label;
      img.loading = "eager";
      img.decoding = "async";
      mediaStage.appendChild(img);
    }

    function renderVideo(src, label) {
      mediaStage.innerHTML = "";
      const iframe = document.createElement("iframe");
      iframe.src = src;
      iframe.title = label;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      mediaStage.appendChild(iframe);
    }

    function renderPlaceholder(text) {
      mediaStage.innerHTML = `
        <div class="media-placeholder">
          <p>${text}</p>
        </div>
      `;
    }

    async function renderProject(projectKey) {
      const selected = content[projectKey];
      setPressedButton(projectKey);

      // texto: para videos usa o text do item atual (vídeo 1/2), para images usa selected.text
      if (selected.type !== "videos") {
        projectText.textContent = selected.text;
      } else {
        // para videos: texto vem do item atual (vídeo 1/2)
        projectText.textContent = selected.items?.[state.currentIndex]?.text || "";
      }



      let items = [];

      if (selected.type === "videos") {
        // videos: items é uma lista de { src, text }
        items = selected.items;
      } else if (selected.type === "images") {
        items = await getManifestItems(selected.manifest);
      }

      if (!items.length) {
        updateMediaNav(0);
        renderPlaceholder("Sem conteúdo disponível.");
        return;
      }

      if (state.currentIndex > items.length - 1) {
        state.currentIndex = 0;
      }

      updateMediaNav(items.length);

      const currentItem = items[state.currentIndex];

      if (selected.type === "videos") {
        // currentItem: { src, text }
        renderVideo(currentItem.src, currentItem.text);
      } else {
        // imagens: currentItem é src string
        renderImage(currentItem, selected.text);
      }
    }

    projectButtons.forEach((button) => {
      button.addEventListener("click", async () => {
        state.currentProject = button.dataset.project;
        state.currentIndex = 0;
        await renderProject(state.currentProject);
      });
    });

    prevMediaBtn.addEventListener("click", async () => {
      const selected = content[state.currentProject];
      const items = selected.type === "videos"
        ? selected.items
        : await getManifestItems(selected.manifest);

      if (items.length <= 1) return;

      state.currentIndex = (state.currentIndex - 1 + items.length) % items.length;
      await renderProject(state.currentProject);
    });

    nextMediaBtn.addEventListener("click", async () => {
      const selected = content[state.currentProject];
      const items = selected.type === "videos"
        ? selected.items
        : await getManifestItems(selected.manifest);

      if (items.length <= 1) return;

      state.currentIndex = (state.currentIndex + 1) % items.length;
      await renderProject(state.currentProject);
    });

    renderProject(state.currentProject);
  </script>
  <script src="page-transition.js"></script>
</body>
</html>
