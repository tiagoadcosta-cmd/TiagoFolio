<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiago Duarte Costa — Contacto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <header class="site-header">
      <div class="site-header__inner">
        <div class="site-logo" aria-label="Logo">
          <!-- meter logo aqui -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="site-name">Tiago Duarte Costa</p>
      </div>
    </header>

    <section class="hero">
      <div class="hero__inner">
        <h1>Contacto</h1>
        <p>Entra em contacto comigo e acompanha o meu percurso nas plataformas abaixo.</p>
      </div>
    </section>

    <main class="cards-section">
      <div class="cards-section__inner">
        <section class="cards-grid cards-grid--single">

          <article class="card">
            <div class="card__content">
              <h2>Vamos falar</h2>
              <p>Podes entrar em contacto comigo da seguinte forma.</p>
            </div>

            <div class="card__actions">
              <a
                href="https://www.instagram.com/tdc_tiago/"
                class="card__button contact-icon-button"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Instagram"
              >
                <img src="instagram.svg" alt="Instagram">
              </a>

              <a
                href="https://www.linkedin.com/in/tiago-duarte-costa-3b9310145/"
                class="card__button contact-icon-button"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="LinkedIn"
              >
                <img src="linkedin.svg" alt="LinkedIn">
              </a>

              <a
                href="tiago_cv_2026.pdf"
                class="card__button contact-icon-button"
                download="tiago_cv_2026.pdf"
                aria-label="Descarregar CV"
              >
                <img src="cv.svg" alt="Descarregar CV">
              </a>
            </div>
          </article>

        </section>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <div class="bottom-nav__inner">

        <div class="bottom-nav__side bottom-nav__side--left">
          <a href="javascript:history.back()">Voltar</a>
        </div>

        <div class="bottom-nav__center">
          <a href="index.html">Início</a>
          <a href="percurso.html">Percurso</a>
          <a href="projetos.html">Projetos</a>
          <a href="contacto.html" class="is-active">Contacto</a>
        </div>

        <div class="bottom-nav__side bottom-nav__side--right is-hidden">
          <a href="index.html">Continuar</a>
        </div>

      </div>
    </nav>

  </div>
</body>
</html>
